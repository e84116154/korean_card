<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韓語有聲單字卡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: black;
        }

        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        
        .card-container {
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .flipped .card-container {
            transform: rotateY(180deg);
        }

        /* 滾動條樣式 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-zinc-100">
    <div class="min-h-screen flex flex-col items-center p-4 sm:p-8">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-black text-pink-500 mb-2 tracking-tighter uppercase">韓語有聲單字卡</h1>
            <p class="text-zinc-500 text-sm">點擊卡片翻面，選擇語速聆聽發音</p>
        </header>

        <!-- 分類選擇器 -->
        <div id="category-list" class="flex gap-2 mb-10 bg-zinc-900 p-2 rounded-2xl shadow-2xl border border-zinc-800 overflow-x-auto max-w-full no-scrollbar">
            <!-- 由 JS 動態生成 -->
        </div>

        <!-- 單字卡區域 -->
        <div class="relative w-full max-w-md h-80 perspective-1000 group">
            <div id="flashcard" class="relative w-full h-full transform-style-3d cursor-pointer">
                <!-- 正面 -->
                <div class="absolute w-full h-full backface-hidden bg-zinc-900 rounded-3xl shadow-2xl border border-pink-900/30 flex flex-col items-center justify-center p-8 text-center">
                    <span class="text-pink-500 font-black mb-6 text-xs tracking-[0.2em] uppercase opacity-80">韓文情境</span>
                    <div id="word-kr" class="font-black mb-4 text-white leading-tight drop-shadow-md text-4xl"></div>
                    <div id="word-rom" class="text-sm text-zinc-500 font-mono italic px-4 bg-black/30 py-1 rounded-full"></div>
                    <div class="mt-10 text-pink-500/40 text-[10px] font-bold tracking-widest animate-pulse">點擊翻面</div>
                </div>

                <!-- 反面 -->
                <div class="absolute w-full h-full backface-hidden bg-pink-600 rounded-3xl shadow-2xl flex flex-col items-center justify-center p-8 text-center rotate-y-180">
                    <span class="text-pink-900/60 font-black mb-6 text-xs tracking-[0.2em] uppercase">中文翻譯</span>
                    <div id="word-cn" class="font-black text-black leading-snug text-4xl"></div>
                </div>
            </div>

            <!-- 導航按鈕 -->
            <button id="prev-btn" class="absolute left-[-20px] top-1/2 -translate-y-1/2 w-12 h-12 bg-zinc-900 text-pink-500 rounded-full shadow-2xl border border-zinc-800 flex items-center justify-center hover:bg-pink-600 hover:text-white transition-all z-10 sm:left-[-60px]">
                <i data-lucide="chevron-left" class="w-7 h-7"></i>
            </button>
            <button id="next-btn" class="absolute right-[-20px] top-1/2 -translate-y-1/2 w-12 h-12 bg-zinc-900 text-pink-500 rounded-full shadow-2xl border border-zinc-800 flex items-center justify-center hover:bg-pink-600 hover:text-white transition-all z-10 sm:right-[-60px]">
                <i data-lucide="chevron-right" class="w-7 h-7"></i>
            </button>
        </div>

        <!-- 控制區 -->
        <div class="w-full max-w-md mt-10 space-y-6">
            <div id="progress-text" class="text-center text-zinc-600 text-xs font-black tracking-widest uppercase"></div>

            <div class="bg-zinc-900 p-6 rounded-3xl shadow-2xl border border-zinc-800">
                <div class="text-center text-xs font-black text-pink-500/60 mb-5 flex items-center justify-center gap-2 uppercase tracking-tighter">
                    <i data-lucide="volume-2" class="w-4 h-4"></i> 語速控制調節
                </div>
                
                <div class="grid grid-cols-3 gap-4">
                    <button onclick="playSpeech('slow')" class="speed-btn flex flex-col items-center gap-2 p-4 rounded-2xl bg-black border border-zinc-800 hover:border-pink-500 hover:text-pink-500 transition-all">
                        <i data-lucide="timer" class="w-6 h-6"></i>
                        <span class="text-[10px] font-black tracking-widest">慢速</span>
                    </button>
                    <button onclick="playSpeech('normal')" class="speed-btn flex flex-col items-center gap-2 p-4 rounded-2xl bg-black border border-zinc-800 hover:border-pink-500 hover:text-pink-500 transition-all">
                        <i data-lucide="play" class="w-6 h-6"></i>
                        <span class="text-[10px] font-black tracking-widest">正常</span>
                    </button>
                    <button onclick="playSpeech('fast')" class="speed-btn flex flex-col items-center gap-2 p-4 rounded-2xl bg-black border border-zinc-800 hover:border-pink-500 hover:text-pink-500 transition-all">
                        <i data-lucide="fast-forward" class="w-6 h-6"></i>
                        <span class="text-[10px] font-black tracking-widest">快速</span>
                    </button>
                </div>

                <div id="loading-indicator" class="mt-6 hidden flex items-center justify-center gap-3 text-pink-500 text-xs font-black uppercase tracking-widest animate-pulse">
                    <span class="flex h-2 w-2 rounded-full bg-pink-500"></span>
                    音訊載入中...
                </div>

                <div id="error-message" class="mt-4 text-center text-red-500 text-[10px] font-bold hidden"></div>
            </div>

            <button onclick="resetCurrentCategory()" class="w-full py-4 flex items-center justify-center gap-2 text-zinc-600 hover:text-pink-500 transition-colors text-xs font-black uppercase tracking-widest">
                <i data-lucide="rotate-ccw" class="w-4 h-4"></i> 重置當前分類
            </button>
        </div>
    </div>

    <script>
        const apiKey = ""; // 可填入 Gemini API Key；留空時會自動使用瀏覽器語音

        const VOCABULARY = {
            greetings: [
                { kr: "안녕하세요", cn: "你好", rom: "An-nyeong-ha-se-yo" },
                { kr: "감사합니다", cn: "謝謝", rom: "Gam-sa-ham-ni-da" },
                { kr: "죄송합니다", cn: "對不起", rom: "Joe-song-ham-ni-da" },
                { kr: "반갑습니다", cn: "很高興見到你", rom: "Ban-gap-seum-ni-da" },
                { kr: "안녕히 계세요", cn: "再見 (留者對去者)", rom: "An-nyeong-hi gye-se-yo" }
            ],
            numbers: [
                { kr: "하나", cn: "一", rom: "Ha-na" },
                { kr: "둘", cn: "二", rom: "Dul" },
                { kr: "셋", cn: "三", rom: "Set" },
                { kr: "넷", cn: "四", rom: "Net" },
                { kr: "다섯", cn: "五", rom: "Da-seot" }
            ],
            daily: [
                { kr: "물 좀 주세요", cn: "請給我一點水", rom: "Mul jom ju-se-yo" },
                { kr: "사과가 진짜 맛있어요", cn: "蘋果真的很好吃", rom: "Sa-gwa-ga jin-jja ma-si-sseo-yo" },
                { kr: "이제 집에 가요", cn: "現在要回家了", rom: "I-je ji-be ga-yo" },
                { kr: "학교가 어디에 있어요?", cn: "學校在哪裡呢？", rom: "Hak-gyo-ga eo-di-e i-sseo-yo?" },
                { kr: "제 친한 친구예요", cn: "是我很要好的朋友", rom: "Je chi-nan chin-gu-ye-yo" }
            ]
        };

        const CATEGORIES = [
            { id: 'greetings', name: '打招呼', icon: '👋' },
            { id: 'numbers', name: '數字', icon: '🔢' },
            { id: 'daily', name: '日常句子', icon: '💬' }
        ];

        let currentCategory = 'greetings';
        let currentIndex = 0;
        let isFlipped = false;
        let isLoading = false;
        const audioCache = {};

        // 初始化
        function init() {
            renderCategories();
            updateCard();
            lucide.createIcons();
            
            // 事件綁定
            document.getElementById('flashcard').addEventListener('click', toggleFlip);
            document.getElementById('prev-btn').addEventListener('click', (e) => { e.stopPropagation(); prevCard(); });
            document.getElementById('next-btn').addEventListener('click', (e) => { e.stopPropagation(); nextCard(); });
        }

        function renderCategories() {
            const container = document.getElementById('category-list');
            container.innerHTML = CATEGORIES.map(cat => `
                <button onclick="setCategory('${cat.id}')" id="btn-${cat.id}" 
                    class="category-btn px-5 py-2.5 rounded-xl text-sm font-bold transition-all flex items-center gap-2 whitespace-nowrap
                    ${currentCategory === cat.id ? 'bg-pink-600 text-white shadow-[0_0_15px_rgba(219,39,119,0.5)]' : 'text-zinc-400 hover:bg-zinc-800 hover:text-pink-400'}">
                    <span>${cat.icon}</span>
                    ${cat.name}
                </button>
            `).join('');
        }

        function setCategory(id) {
            currentCategory = id;
            currentIndex = 0;
            isFlipped = false;
            renderCategories();
            updateCard();
        }

        function updateCard() {
            const data = VOCABULARY[currentCategory][currentIndex];
            const flashcard = document.getElementById('flashcard');
            
            flashcard.classList.remove('flipped');
            isFlipped = false;

            document.getElementById('word-kr').textContent = data.kr;
            document.getElementById('word-rom').textContent = data.rom;
            document.getElementById('word-cn').textContent = data.cn;
            document.getElementById('progress-text').textContent = `進度：第 ${currentIndex + 1} 個 / 共 ${VOCABULARY[currentCategory].length} 個`;
            
            // 字體大小調整
            if (data.kr.length > 8) {
                document.getElementById('word-kr').classList.replace('text-4xl', 'text-3xl');
            } else {
                document.getElementById('word-kr').classList.replace('text-3xl', 'text-4xl');
            }
        }

        function toggleFlip() {
            isFlipped = !isFlipped;
            const flashcard = document.getElementById('flashcard');
            if (isFlipped) {
                flashcard.style.transform = 'rotateY(180deg)';
            } else {
                flashcard.style.transform = 'rotateY(0deg)';
            }
        }

        function nextCard() {
            currentIndex = (currentIndex + 1) % VOCABULARY[currentCategory].length;
            updateCard();
        }

        function prevCard() {
            currentIndex = (currentIndex - 1 + VOCABULARY[currentCategory].length) % VOCABULARY[currentCategory].length;
            updateCard();
        }

        function resetCurrentCategory() {
            currentIndex = 0;
            updateCard();
        }

        // PCM 轉 WAV 輔助函式
        function pcmToWav(pcmData, sampleRate = 24000) {
            const buffer = new ArrayBuffer(44 + pcmData.length);
            const view = new DataView(buffer);
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            };
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + pcmData.length, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, pcmData.length, true);
            new Uint8Array(buffer, 44).set(pcmData);
            return new Blob([buffer], { type: 'audio/wav' });
        }

        function speakWithBrowserTTS(text, speed) {
            if (!("speechSynthesis" in window)) {
                showError("此瀏覽器不支援內建語音功能。");
                return;
            }

            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = "ko-KR";
            utterance.pitch = 1;
            utterance.rate = speed === "slow" ? 0.65 : speed === "fast" ? 1.25 : 0.95;

            const voices = window.speechSynthesis.getVoices();
            const koVoice = voices.find(v => v.lang && v.lang.toLowerCase().startsWith("ko"));
            if (koVoice) utterance.voice = koVoice;

            window.speechSynthesis.speak(utterance);
        }

        async function playSpeech(speed) {
            if (isLoading) return;

            const text = VOCABULARY[currentCategory][currentIndex].kr;
            const cacheKey = `${text}_${speed}`;

            if (!apiKey) {
                showError(null);
                speakWithBrowserTTS(text, speed);
                return;
            }

            if (audioCache[cacheKey]) {
                try {
                    await new Audio(audioCache[cacheKey]).play();
                } catch (_) {
                    showError("音訊播放被瀏覽器阻擋，請再按一次播放。");
                }
                return;
            }

            setLoading(true);
            showError(null);

            let promptPrefix = speed === 'slow' ? "Say very slowly: " : 
                               speed === 'fast' ? "Say very quickly: " : 
                               "Say at a natural pace: ";
            const fullPrompt = `${promptPrefix}${text}`;

            const fetchWithRetry = async (retries = 5, baseDelay = 1000) => {
                for (let attempt = 0; attempt <= retries; attempt++) {
                    try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: fullPrompt }] }],
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: {
                                    voiceConfig: {
                                        prebuiltVoiceConfig: { voiceName: "Kore" }
                                    }
                                }
                            }
                        })
                    });

                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const data = await response.json();
                        const inlineData = data.candidates?.[0]?.content?.parts?.[0]?.inlineData;
                        const base64Audio = inlineData?.data;
                        const mimeType = inlineData?.mimeType || "audio/wav";
                    
                        if (!base64Audio) throw new Error("No audio in response");

                    const binaryString = atob(base64Audio);
                    const bytes = new Uint8Array(binaryString.length);
                    for (let i = 0; i < binaryString.length; i++) {
                        bytes[i] = binaryString.charCodeAt(i);
                    }
                    
                        const audioBlob = mimeType.includes("pcm")
                            ? pcmToWav(bytes, 24000)
                            : new Blob([bytes], { type: mimeType });
                        const url = URL.createObjectURL(audioBlob);
                    audioCache[cacheKey] = url;
                        await new Audio(url).play();
                        return;
                    } catch (err) {
                        if (attempt === retries) {
                            throw err;
                        }
                        await new Promise(r => setTimeout(r, baseDelay * (2 ** attempt)));
                    }
                }
            };

            try {
                await fetchWithRetry();
            } catch (_) {
                showError("音訊播放失敗，請檢查 API 金鑰或網路。");
            } finally {
                setLoading(false);
            }
        }

        function setLoading(val) {
            isLoading = val;
            const loader = document.getElementById('loading-indicator');
            loader.style.display = val ? 'flex' : 'none';
            document.querySelectorAll('.speed-btn').forEach(btn => btn.disabled = val);
        }

        function showError(msg) {
            const errorEl = document.getElementById('error-message');
            if (msg) {
                errorEl.textContent = msg;
                errorEl.classList.remove('hidden');
            } else {
                errorEl.classList.add('hidden');
            }
        }

        window.onload = init;
    </script>
</body>
</html>
